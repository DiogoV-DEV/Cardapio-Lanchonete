<!DOCTYPE html>
<html>
<head>

<title>Cardápio</title>

<link rel="stylesheet" href="/static/estilo.css">

<script>

function atualizarTotal(){

    let total = 0
    let lista = ""

    document.querySelectorAll(".item").forEach(function(linha){

        let preco = parseFloat(linha.dataset.preco)
        let nome = linha.dataset.nome
        let qtd = parseInt(linha.querySelector(".quantidade").innerText) || 0

        if(qtd > 0){
            total += preco * qtd
            lista += "<li>" + qtd + "x " + nome + "</li>"
        }

    })

    document.getElementById("total").innerText = total.toFixed(2)
    document.getElementById("listaCarrinho").innerHTML = lista

}

function finalizarPedido(){

    let nome = document.getElementById("nome").value
    let endereco = document.getElementById("endereco").value
    let pagamento = document.getElementById("pagamento").value

    let mensagem = "Pedido da Lanchonete:%0A%0A"

    mensagem += "Cliente: " + nome + "%0A"
    mensagem += "Endereço: " + endereco + "%0A"
    mensagem += "Pagamento: " + pagamento + "%0A%0A"

    mensagem += "Itens:%0A"

    document.querySelectorAll(".item").forEach(function(linha){

        let nomeItem = linha.dataset.nome
        let qtd = parseInt(linha.querySelector(".quantidade").value) || 0

        if(qtd > 0){
            mensagem += qtd + "x " + nomeItem + "%0A"
        }

    })

    let total = document.getElementById("total").innerText

    mensagem += "%0ATotal: R$" + total

    let telefone = "5581999999999"

    let url = "https://wa.me/" + telefone + "?text=" + mensagem

    window.open(url, "_blank")

}

function aumentar(botao){

    let linha = botao.closest(".item")
    let qtdElemento = linha.querySelector(".quantidade")

    let qtd = parseInt(qtdElemento.innerText)

    qtd++

    qtdElemento.innerText = qtd

    animarCarrinho(botao)

    atualizarTotal()

}

function diminuir(botao){

    let linha = botao.closest(".item")
    let qtdElemento = linha.querySelector(".quantidade")

    let qtd = parseInt(qtdElemento.innerText)

    if(qtd > 0){
        qtd--
    }

    qtdElemento.innerText = qtd

    atualizarTotal()

}

function animarCarrinho(botao){

    let bola = document.getElementById("animacaoItem")

    let origem = botao.getBoundingClientRect()
    let destino = document.getElementById("carrinho").getBoundingClientRect()

    bola.style.left = origem.left + "px"
    bola.style.top = origem.top + "px"
    bola.style.opacity = 1

    setTimeout(function(){

        bola.style.left = destino.left + "px"
        bola.style.top = destino.top + "px"

    },10)

    setTimeout(function(){
        bola.style.opacity = 0
    },600)

}

</script>

</head>

<div id="animacaoItem"></div>

<body>

<div class="container">

<h1>Cardápio da Lanchonete</h1>

<h3>Seus dados</h3>

Nome:<br>
<input id="nome"><br><br>

Endereço:<br>
<input id="endereco"><br><br>

Forma de pagamento:<br>

<select id="pagamento">

<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>

</select>

<br><br>

{% for categoria, itens in cardapio.items() %}

<h2>{{ categoria }}</h2>

<div class="produtos">

{% for item in itens %}

<div class="produto item" data-preco="{{ item.preco }}" data-nome="{{ item.nome }}">

<div class="produto-info">

<h3>{{ item.nome }}</h3>

<p class="preco">R$ {{ item.preco }}</p>

</div>

<div class="controle">

<button onclick="diminuir(this)">-</button>

<span class="quantidade">0</span>

<button onclick="aumentar(this)">+</button>

</div>

</div>

{% endfor %}

</div>

{% endfor %}

<h2>Total: R$ <span id="total">0.00</span></h2>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

</div>

<div id="carrinho">

<h3>🛒 Seu pedido</h3>

<ul id="listaCarrinho"></ul>

<p>Total: R$ <span id="total">0.00</span></p>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

</div>

</body>
